name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # --locked, not --frozen: uv.lock is committed, so a lockfile that has
      # drifted from pyproject should fail here rather than resolve silently
      # into something no contributor is running.
      - run: uv sync --locked --all-extras --dev
        env:
          UV_PYTHON: ${{ matrix.python-version }}

      - name: ruff
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy

      # No network and no model calls: the `calibration` marker is deselected by
      # default in pyproject, and everything else injects test doubles.
      - name: pytest
        run: uv run pytest -q

  # The README's install is `uv tool install .`, and both delivery surfaces
  # invoke `grill` by name. That contract broke once already without any test
  # noticing, because the suite imports the package and never installs it.
  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: install as a tool
        run: uv tool install .

      - name: console scripts exist and run
        env:
          GRILL_HOME: ${{ runner.temp }}/grill-home
        run: |
          grill --help
          test "$(grill serve --json)" = '{"pending": null}'
          # The hook takes its payload on stdin and must exit 0 on anything,
          # including a payload it cannot use. It never has a --help to call.
          echo '{}' | grill-hook
